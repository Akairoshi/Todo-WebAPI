info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5254/Auth/register
  body:
    type: json
    data: |-
      {
        "name": "{{username}}",
        "password": "{{password}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
