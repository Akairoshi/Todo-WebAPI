info:
  name: "Put note update "
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:5254/Note/{{noteId}}
  body:
    type: json
    data: |-
      // Все поля обязательны
      {
        "name" : "Test put note update",
        "text" : "Test put text update"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
