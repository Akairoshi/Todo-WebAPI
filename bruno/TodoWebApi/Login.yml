info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:5254/Auth/login
  body:
    type: json
    data: '{"name": "test", "password": "123456"}'
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var token = res.body.token;
        bru.setEnvVar("token", token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
